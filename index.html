          1: { title: "Chuẩn bị rụng trứng", sizeComparison: "Chưa có kích thước", weight: "~ 0 g", length: "~ 0 mm", fruitIcon: "🥚", fruitName: "Tế bào trứng chuẩn bị", description: "Cơ thể mẹ đang ở chu kỳ kinh nguyệt cuối cùng. Tử cung bắt đầu làm dày lớp niêm mạc giàu chất dinh dưỡng để sẵn sàng đón nhận trứng thụ tinh.", babyMilestone: "Trứng rụng và chuẩn bị gặp tinh trùng để tạo nên một mầm sống mới.", momCare: "Uống bổ sung Acid Folic ngay từ lúc này (400 mcg/ngày) để giảm 90% nguy cơ dị tật ống thần kinh sau này." },
          2: { title: "Sự thụ thai kỳ diệu", sizeComparison: "Siêu nhỏ", weight: "~ 0 g", length: "~ 0.1 mm", fruitIcon: "✨", fruitName: "Hợp tử siêu nhỏ", description: "Sự thụ tinh xảy ra khi tinh trùng gặp trứng tại ống dẫn trứng tạo thành hợp tử. Giới tính và toàn bộ đặc điểm di truyền của bé đã được quyết định ngay tại giây phút này.", babyMilestone: "Hợp tử bắt đầu phân bào liên tục và di chuyển dần về phía tử cung.", momCare: "Giữ tinh thần thoải mái, tránh xa khói thuốc lá, rượu bia và các chất kích thích." },
          3: { title: "Làm tổ trong tử cung", sizeComparison: "Kích thước bằng một hạt cát nhỏ", weight: "~ 0.1 g", length: "~ 0.15 mm", fruitIcon: "🥪", fruitName: "Hạt muối nhỏ", description: "Phôi dâu nay đã phát triển thành phôi nang và bám chặt vào lớp niêm mạc tử cung để làm tổ vững chắc.", babyMilestone: "Hình thành các lớp tế bào ban đầu: nội bì, trung bì và ngoại bì để sau này phát triển thành các cơ quan riêng biệt.", momCare: "Tránh các hoạt động thể chất quá mạnh hay mang vác vật nặng. Ăn các thực phẩm ấm, dễ tiêu." },
          4: { title: "Mầm sống bén rễ", sizeComparison: "Bằng hạt anh túc (Poppy seed)", weight: "~ 0.2 g", length: "~ 0.36 mm", fruitIcon: "🍓", fruitName: "Hạt anh túc", description: "Phôi thai lúc này đã bám rễ sâu vào tử cung. Các mạch máu đầu tiên liên kết mẹ và bé bắt đầu hình thành.", babyMilestone: "Sự hình thành nhau thai sơ khai bắt đầu sản sinh hormone hCG (khiến que thử thai lên 2 vạch).", momCare: "Mẹ có thể dùng que thử thai để kiểm tra. Hãy hẹn lịch khám với bác sĩ sản khoa lần đầu tiên." },
          5: { title: "Ống thần kinh đóng lại", sizeComparison: "Bằng hạt táo nhỏ", weight: "~ 0.4 g", length: "~ 1.25 mm", fruitIcon: "🍎", fruitName: "Hạt táo", description: "Ống thần kinh của bé (sẽ phát triển thành não bộ và tủy sống) chính thức đóng lại trong tuần này.", babyMilestone: "Tim thai thô sơ bắt đầu đập những nhịp đầu tiên, hệ tuần hoàn thô sơ bắt đầu hoạt động.", momCare: "Duy trì uống Acid Folic và Sắt đều đặn. Nếu bắt đầu nghén, hãy uống trà gừng ấm để làm dịu dạ dày." },
          6: { title: "Tim thai đập rộn ràng", sizeComparison: "Bằng một hạt đậu xanh", weight: "~ 0.8 g", length: "~ 4 mm", fruitIcon: "🥦", fruitName: "Hạt đậu xanh", description: "Tim của bé hiện tại đập khoảng 100 - 150 nhịp/phút (nhanh gấp đôi người lớn). Các chồi tay và chân bắt đầu nhú ra.", babyMilestone: "Mũi, miệng và tai của bé bắt đầu định hình rõ rệt trên siêu âm độ phân giải cao.", momCare: "Tránh tự ý uống bất kỳ loại thuốc nào mà chưa có sự đồng ý của bác sĩ sản khoa." },
          7: { title: "Chồi tay chân phát triển", sizeComparison: "Bằng một quả việt quất", weight: "~ 1 g", length: "~ 8 mm", fruitIcon: "🫐", fruitName: "Quả việt quất", description: "Não bộ phát triển thần tốc, sản sinh ra hàng trăm ngàn tế bào thần kinh mới mỗi phút. Các chồi chi dài ra rõ rệt.", babyMilestone: "Ống dẫn thở bắt đầu nối dài từ cổ họng đến lá phổi sơ khai của bé.", momCare: "Nên ăn nhiều bữa nhỏ để đối phó với chứng buồn nôn. Hãy chuẩn bị sẵn bánh quy lạt bên giường." },
          8: { title: "Hình thành ngón tay, ngón chân", sizeComparison: "Bằng một quả mâm xôi", weight: "~ 1.5 g", length: "~ 1.6 cm", fruitIcon: "🍒", fruitName: "Quả mâm xôi", description: "Các ngón tay và chân nhỏ xíu có màng đang hình thành. Bé bắt đầu có những cử động tự phát nhưng mẹ chưa thể cảm nhận được.", babyMilestone: "Hệ xương khớp bắt đầu quá trình sụn hóa. Đuôi phôi thai nhỏ dần và chuẩn bị biến mất.", momCare: "Cần bổ sung thêm thực phẩm dồi dào canxi từ sữa tiệt trùng, phô mai để hỗ trợ hình thành sụn xương." },
          9: { title: "Bé chính thức là 'Thai nhi'", sizeComparison: "Bằng một quả nho lớn", weight: "~ 2 g", length: "~ 2.3 cm", fruitIcon: "🍇", fruitName: "Quả nho lớn", description: "Đuôi phôi thai đã hoàn toàn biến mất. Giai đoạn phôi kết thúc, em bé chính thức được gọi y học là 'Thai nhi'.", babyMilestone: "Nhịp tim thai đạt đỉnh khoảng 170 nhịp/phút. Các cơ quan nội tạng quan trọng bắt đầu tự định vị trí.", momCare: "Uống nhiều nước ấm (2 lít mỗi ngày). Hạn chế tối đa đồ ăn dầu mỡ gây khó tiêu, trào ngược dạ dày." },
          10: { title: "Các khớp hoạt động", sizeComparison: "Bằng quả quất (tắc) chín", weight: "~ 4 g", length: "~ 3.1 cm", fruitIcon: "🍊", fruitName: "Quả quất chín", description: "Xương sườn và xương sống của bé đang định hình rõ nét. Các khớp khuỷu tay và đầu gối đã có thể gập mở.", babyMilestone: "Móng tay và móng chân siêu nhỏ bắt đầu xuất hiện dưới lớp da mỏng manh.", momCare: "Mẹ hãy đi xét nghiệm công thức máu toàn phần nếu chưa thực hiện để phát hiện sớm tình trạng thiếu máu." },
          11: { title: "Phản xạ ban đầu", sizeComparison: "Bằng một quả sung ngọt", weight: "~ 7 g", length: "~ 4.1 cm", fruitIcon: "🍍", fruitName: "Quả sung ngọt", description: "Bé đã có thể mở và khép bàn tay nhỏ bé của mình. Hệ tiêu hóa (ruột) bắt đầu di chuyển từ dây rốn về khoang bụng.", babyMilestone: "Bé bắt đầu tập nuốt nước ối và thận bắt đầu lọc, bài tiết nước tiểu thô sơ ra môi trường ối.", momCare: "Thích hợp nhất để làm xét nghiệm sàng lọc không xâm lấn NIPT hoặc Double Test (Tuần 11 - 13) để phát hiện dị tật nhiễm sắc thể." },
          12: { title: "Hoàn thiện cấu trúc sơ bộ", sizeComparison: "Bằng một quả chanh ta", weight: "~ 14 g", length: "~ 5.4 cm", fruitIcon: "🍋", fruitName: "Quả chanh ta", description: "Gần như toàn bộ hệ thống cơ quan của bé đã phát triển hoàn chỉnh cấu trúc cơ bản. Nguy cơ sảy thai tự nhiên giảm mạnh.", babyMilestone: "Hệ thống thần kinh phản xạ phát triển mạnh, bé sẽ giật mình nhẹ nếu mẹ ấn nhẹ vào bụng.", momCare: "Đây là mốc đo độ mờ da gáy cực kỳ quan trọng bằng siêu âm để tầm soát hội chứng Down." },
          13: { title: "Vân tay xuất hiện", sizeComparison: "Bằng một quả chanh leo", weight: "~ 23 g", length: "~ 7.4 cm", fruitIcon: "🥔", fruitName: "Quả chanh leo", description: "Tuần cuối cùng của Tam cá nguyệt thứ 1. Dấu vân tay độc nhất vô nhị của bé đã hình thành trên các đầu ngón tay.", babyMilestone: "Nhau thai đã phát triển toàn diện và tiếp quản hoàn toàn nhiệm vụ cung cấp oxy và dưỡng chất từ mẹ sang bé.", momCare: "Chúc mừng mẹ đã vượt qua chặng đường nhạy cảm nhất! Cơn nghén sẽ giảm dần từ tuần tới, mẹ có thể bắt đầu ăn ngon miệng hơn." },
          14: { title: "Bắt đầu Tam cá nguyệt 2", sizeComparison: "Bằng một quả chanh vàng lớn", weight: "~ 43 g", length: "~ 8.7 cm", fruitIcon: "🍋", fruitName: "Quả chanh vàng", description: "Bé bắt đầu biết nheo mắt, nhăn mặt và có thể mút ngón tay cái của mình. Thận hoạt động đều đặn để bài tiết nước ối.", babyMilestone: "Lông tơ mịn (lanugo) bắt đầu mọc khắp cơ thể để giữ ấm và bảo vệ làn da mỏng dưới nước ối.", momCare: "Nhu cầu canxi của bé bắt đầu tăng cao. Hãy ăn nhiều thực phẩm giàu canxi và bổ sung viên uống theo chỉ định." },
          15: { title: "Xương bắt đầu cứng cáp", sizeComparison: "Bằng một quả táo ta lớn", weight: "~ 70 g", length: "~ 10 cm", fruitIcon: "🍎", fruitName: "Quả táo ta", description: "Khung xương của bé bắt đầu chuyển hóa từ sụn dẻo thành xương cứng (quá trình cốt hóa). Da của bé lúc này vẫn còn rất mỏng, nhìn rõ các mạch máu bên dưới.", babyMilestone: "Bé bắt đầu thực hiện các động tác hít thở nước ối để luyện cơ phổi nở ra.", momCare: "Nếu thấy nướu (lợi) dễ bị chảy máu khi đánh răng, hãy dùng bàn chải lông mềm và khám nha khoa định kỳ." },
          16: { title: "Cảm nhận ánh sáng", sizeComparison: "Bằng một quả bơ nhỏ", weight: "~ 100 g", length: "~ 11.6 cm", fruitIcon: "🥑", fruitName: "Quả bơ nhỏ", description: "Mắt của bé mặc dù vẫn nhắm chặt nhưng đã bắt đầu nhạy cảm với ánh sáng mạnh rọi qua thành bụng của mẹ.", babyMilestone: "Đầu của bé đã đứng thẳng hơn so với cơ thể, tai di chuyển về đúng vị trí hai bên đầu.", momCare: "Thích hợp làm xét nghiệm Triple Test (Tuần 15 - 18) nếu trước đó mẹ chưa làm Double Test hay NIPT." },
          17: { title: "Tích lũy mỡ nâu", sizeComparison: "Bằng một quả lựu", weight: "~ 140 g", length: "~ 13 cm", fruitIcon: "🧅", fruitName: "Quả lựu", description: "Một lớp mỡ đặc biệt (mỡ nâu) bắt đầu tích tụ dưới da của bé, đóng vai trò giữ ấm cơ thể ngay sau khi bé chào đời.", babyMilestone: "Hệ tuần hoàn phát triển mạnh mẽ, tim bé bơm khoảng 25 lít máu mỗi ngày đi khắp cơ thể nhỏ bé.", momCare: "Tránh nằm ngửa khi ngủ. Nên bắt đầu nằm nghiêng sang bên trái để tối ưu dòng máu truyền qua nhau thai." },
          18: { title: "Bé nghe thấy tiếng mẹ", sizeComparison: "Bằng quả ớt chuông lớn", weight: "~ 190 g", length: "~ 14.2 cm", fruitIcon: "🫑", fruitName: "Quả ớt chuông", description: "Các xương nhỏ trong tai trong đã phát triển hoàn thiện giúp bé bắt đầu nghe thấy âm thanh từ thế giới bên ngoài rõ nét.", babyMilestone: "Bé có thể giật mình hoặc đạp mạnh hơn khi nghe thấy tiếng động lớn đột ngột ngoài môi trường.", momCare: "Bắt đầu trò chuyện, đọc sách hoặc cho bé nghe những giai điệu nhạc êm dịu. Đây là phương pháp thai giáo âm thanh tuyệt vời." },
          19: { title: "Lớp màng bảo vệ da", sizeComparison: "Bằng quả cà chua lớn", weight: "~ 240 g", length: "~ 15.3 cm", fruitIcon: "🍅", fruitName: "Quả cà chua lớn", description: "Lớp chất gây (vernix caseosa) màu trắng, trơn bóng bao phủ khắp làn da bé để bảo vệ da không bị trầy xước hay nhăn nheo trong nước ối.", babyMilestone: "Các tế bào thần kinh chuyên biệt cho từng giác quan (khứu giác, vị giác, thị giác, thính giác) phát triển chuyên sâu.", momCare: "Cảm giác thèm ăn tăng mạnh. Hãy kiểm soát chất lượng đồ ăn, ưu tiên protein và chất xơ hơn là tinh bột ngọt." },
          20: { title: "Cột mốc nửa chặng đường", sizeComparison: "Bằng một quả chuối tiêu lớn", weight: "~ 300 g", length: "~ 25.6 cm (Đo từ đầu đến chân)", fruitIcon: "🍌", fruitName: "Quả chuối tiêu", description: "Mẹ đã đi được một nửa hành trình mang thai! Tử cung của mẹ lúc này đã phát triển cao ngang rốn.", babyMilestone: "Mẹ bắt đầu cảm nhận rất rõ các cú máy, đạp, nhào lộn tinh nghịch đầu tiên của bé (thai máy).", momCare: "Thời điểm vàng để thực hiện Siêu âm hình thái học 4D (Tuần 20 - 24) để rà soát toàn bộ cấu trúc cơ thể bé." },
          21: { title: "Nuốt nước ối đều đặn", sizeComparison: "Bằng một củ cà rốt lớn", weight: "~ 360 g", length: "~ 26.7 cm", fruitIcon: "🥕", fruitName: "Củ cà rốt lớn", description: "Hệ tiêu hóa của bé tiếp tục hoàn thiện thông qua việc nuốt nước ối thường xuyên. Phân su màu xanh đen bắt đầu tích tụ trong ruột bé.", babyMilestone: "Bé bắt đầu có chu kỳ ngủ và thức rõ ràng. Khi bé thức sẽ chuyển động nhiều hơn.", momCare: "Tăng cường uống nước lọc ấm và ăn nhiều rau xanh để phòng ngừa trĩ và táo bón thai kỳ đang gia tăng." },
          22: { title: "Vị giác hình thành", sizeComparison: "Bằng một quả đu đủ nhỏ", weight: "~ 430 g", length: "~ 27.8 cm", fruitIcon: "🥭", fruitName: "Quả đu đủ nhỏ", description: "Các gai vị giác trên lưỡi của bé đã hình thành đầy đủ. Bé có thể cảm nhận được mùi vị của nước ối (vốn thay đổi theo món ăn của mẹ).", babyMilestone: "Lông mày và mí mắt đã hoàn toàn định hình xong.", momCare: "Mẹ ăn đa dạng các món ăn lành mạnh để bé làm quen với nhiều hương vị khác nhau ngay từ trong bụng mẹ." },
          23: { title: "Sản sinh chất diện hoạt", sizeComparison: "Bằng một quả bưởi nhỏ", weight: "~ 500 g", length: "~ 28.9 cm", fruitIcon: "🍊", fruitName: "Quả bưởi nhỏ", description: "Phổi của bé bắt đầu sản sinh ra chất diện hoạt (surfactant) - chất giúp các túi phổi không bị xẹp lại khi bé hít thở không khí sau này.", babyMilestone: "Da bé chuyển sang màu đỏ hồng do các mạch máu li ti dưới da phát triển mạnh mẽ.", momCare: "Khi đi xe máy hoặc ô tô, mẹ lưu ý thắt dây an toàn vòng xuống dưới bụng bầu để tránh lực ép vào tử cung." },
          24: { title: "Cột mốc sống sót tối thiểu", sizeComparison: "Bằng một bắp ngô ngọt lớn", weight: "~ 600 g", length: "~ 30 cm", fruitIcon: "🌽", fruitName: "Bắp ngô ngọt", description: "Mốc phát triển y học tối thiểu. Nếu chẳng may sinh non ở tuần này, em bé đã có cơ hội sống sót nếu được chăm sóc y tế tích cực.", babyMilestone: "Các phế nang phổi bắt đầu hình thành liên tục giúp hệ hô hấp chuẩn bị hoạt động độc lập.", momCare: "Giai đoạn quan trọng để làm xét nghiệm dung nạp đường huyết (Tuần 24 - 28) để tầm soát tiểu đường thai kỳ." },
          25: { title: "Bé bắt đầu mở mắt", sizeComparison: "Bằng một quả súp lơ xanh", weight: "~ 660 g", length: "~ 34.6 cm", fruitIcon: "🥦", fruitName: "Quả súp lơ xanh", description: "Mắt của bé bắt đầu hé mở và có thể chớp mắt thường xuyên. Cấu trúc cột sống cứng cáp hơn để nâng đỡ cơ thể bé.", babyMilestone: "Hệ thống mạch máu trong phổi phát triển vượt bậc để chuẩn bị cho nhịp thở đầu đời.", momCare: "Nếu mẹ thấy tay chân bị tê bì hoặc đau lưng nhiều, hãy thử tập các bài yoga bầu nhẹ nhàng hoặc massage chuyên biệt." },
          26: { title: "Sóng nano hoạt động mạnh", sizeComparison: "Bằng một quả dưa hấu tí hon", weight: "~ 760 g", length: "~ 35.6 cm", fruitIcon: "🍉", fruitName: "Dưa hấu tí hon", description: "Các dây thần kinh trong tai phát triển hoàn chỉnh hơn giúp bé nhạy cảm và phản ứng linh hoạt với giọng nói của cả bố và mẹ.", babyMilestone: "Sóng não của bé bắt đầu hoạt động mạnh mẽ, ghi nhận hệ thống phản xạ thần kinh ngày một tinh vi.", momCare: "Bố hãy tích cực trò chuyện áp tai vào bụng mẹ để bé quen giọng nói trầm ấm của bố." },
          27: { title: "Kết thúc Tam cá nguyệt 2", sizeComparison: "Bằng một cây cải bắp lớn", weight: "~ 875 g", length: "~ 36.6 cm", fruitIcon: "🥬", fruitName: "Cải bắp lớn", description: "Tuần cuối cùng của tam cá nguyệt thứ 2. Phổi, gan và hệ thống miễn dịch của bé tiếp tục hoàn thiện các bước cuối.", babyMilestone: "Bé bắt đầu xuất hiện những nhịp nấc cụt thường xuyên do tập hít thở nước ối (mẹ cảm nhận như những nhịp giật nhẹ đều đặn).", momCare: "Mẹ nên đo huyết áp thường xuyên để phát hiện sớm nguy cơ tiền sản giật (nếu có)." },
          28: { title: "Bắt đầu Tam cá nguyệt 3", sizeComparison: "Bằng một quả dừa", weight: "~ 1 kg", length: "~ 37.6 cm", fruitIcon: "🥥", fruitName: "Quả dừa", description: "Chào mừng mẹ đến với 3 tháng cuối! Bé cưng lúc này đã nặng khoảng 1 kg. Mắt bé có thể nhắm mở và nhìn xung quanh linh hoạt.", babyMilestone: "Lớp lông tơ bắt đầu rụng dần, mỡ dưới da tiếp tục tích tụ nhanh chóng.", momCare: "Cần tăng cường uống viên Sắt và Canxi đầy đủ vì đây là lúc bé hút dưỡng chất từ mẹ mạnh mẽ nhất để bứt phá cân nặng." },
          29: { title: "Não bộ phát triển bùng nổ", sizeComparison: "Bằng một quả bí ngô nhỏ", weight: "~ 1.15 kg", length: "~ 38.6 cm", fruitIcon: "🎃", fruitName: "Quả bí ngô nhỏ", description: "Bộ não phát triển rất nhanh, bắt đầu xuất hiện các nếp nhăn và rãnh não sâu để tăng diện tích chứa tế bào thần kinh.", babyMilestone: "Bé đã có thể tự điều hòa thân nhiệt ở mức ổn định nhờ sự phát triển của hệ thần kinh trung ương.", momCare: "Bổ sung lượng DHA dồi dào từ cá hồi, trứng và quả óc chó để hỗ trợ quá trình hình thành não bộ của con yêu." },
          30: { title: "Không gian chật chội", sizeComparison: "Bằng một bắp cải thảo lớn", weight: "~ 1.3 kg", length: "~ 39.9 cm", fruitIcon: "🥬", fruitName: "Bắp cải thảo lớn", description: "Bé đã chiếm phần lớn không gian trong tử cung của mẹ. Lượng nước ối bắt đầu giảm dần nhường chỗ cho em bé lớn lên.", babyMilestone: "Tủy xương đã tiếp quản hoàn toàn nhiệm vụ sản xuất hồng cầu thay cho lá gan và lá lách.", momCare: "Mẹ bắt đầu thấy khó thở nhẹ do tử cung đẩy cơ hoành lên cao. Hãy ngồi thẳng lưng và hít thở sâu." },
          31: { title: "Xoay đầu chuẩn bị ngôi", sizeComparison: "Bằng một quả dừa xiêm lớn", weight: "~ 1.5 kg", length: "~ 41.1 cm", fruitIcon: "🥥", fruitName: "Quả dừa xiêm lớn", description: "Nhiều em bé bắt đầu xoay đầu xuống phía dưới tử cung (ngôi thuận) để chuẩn bị sẵn tư thế thuận lợi cho kỳ sinh nở sắp tới.", babyMilestone: "Hệ xương khớp phát triển cứng cáp nhưng các xương sọ vẫn giữ cấu trúc mềm dẻo để dễ chui qua đường sinh.", momCare: "Mẹ hãy bắt đầu học cách đếm cử động thai (thai máy) mỗi ngày sau bữa ăn để theo dõi sức khỏe của con." },
          32: { title: "Da dẻ căng mịn hồng hào", sizeComparison: "Bằng một quả dưa hấu vừa", weight: "~ 1.7 kg", length: "~ 42.4 cm", fruitIcon: "🍉", fruitName: "Quả dưa hấu vừa", description: "Nhờ lớp mỡ dưới da tích tụ đầy đặn, làn da nhăn nheo của bé trước đây nay đã căng mịn, hồng hào và đáng yêu vô cùng.", babyMilestone: "Hệ thần kinh, tiêu hóa và bài tiết của bé hoạt động cực kỳ trơn tru và phối hợp nhịp nhàng.", momCare: "Khám thai đều đặn 2 tuần một lần từ mốc này. Hãy chuẩn bị dần giỏ đồ đi sinh (quần áo, bỉm sữa...)." },
          33: { title: "Hệ miễn dịch thô sơ", sizeComparison: "Bằng một quả dứa lớn", weight: "~ 1.9 kg", length: "~ 43.7 cm", fruitIcon: "🍍", fruitName: "Quả dứa lớn", description: "Bé bắt đầu nhận được các kháng thể miễn dịch truyền từ máu mẹ qua nhau thai để tự bảo vệ cơ thể khỏi virus, vi khuẩn ngay khi chào đời.", babyMilestone: "Hệ thống miễn dịch thô sơ tự thân của bé bắt đầu tự vận hành nhẹ.", momCare: "Nên tắm nước ấm, ngâm chân nước ấm gừng muối trước khi ngủ để giảm sưng phù chân và chuột rút." },
          34: { title: "Phổi tiếp tục hoàn thiện", sizeComparison: "Bằng một quả dưa lưới lớn", weight: "~ 2.15 kg", length: "~ 45 cm", fruitIcon: "🍈", fruitName: "Quả dưa lưới lớn", description: "Lớp màng bảo vệ da (gây) ngày một dày hơn. Hệ thống hô hấp và phổi đã hoàn thiện hầu như hoàn toàn.", babyMilestone: "Bé đã có khả năng điều hòa hơi thở nhịp nhàng nếu sinh non ở tuần này mà không cần hỗ trợ máy thở quá nhiều.", momCare: "Nếu mẹ thấy xuất hiện các cơn gò giả (Braxton Hicks) không đau và không đều, hãy ngồi nghỉ ngơi và uống một cốc nước ấm." },
          35: { title: "Tăng tốc cân nặng", sizeComparison: "Bằng một quả dưa hấu lớn", weight: "~ 2.4 kg", length: "~ 46.2 cm", fruitIcon: "🍉", fruitName: "Quả dưa hấu lớn", description: "Bé tăng trọng lượng rất nhanh trong giai đoạn này (khoảng 200 - 250g mỗi tuần). Không gian tử cung đã quá chật để bé nhào lộn.", babyMilestone: "Thận và gan của bé đã hoàn tất toàn bộ quá trình xử lý chất thải sinh học thô sơ.", momCare: "Hãy hoàn thành hồ sơ sinh tại bệnh viện mẹ dự định sinh nở." },
          36: { title: "Chuẩn bị tụt xuống khung chậu", sizeComparison: "Bằng một cây đu đủ lớn", weight: "~ 2.6 kg", length: "~ 47.4 cm", fruitIcon: "🥬", fruitName: "Cây đu đủ lớn", description: "Bé cưng bắt đầu tụt dần xuống sâu dưới khung chậu của mẹ (hiện tượng sa bụng bầu). Mẹ sẽ thấy dễ thở hơn nhưng áp lực lên bàng quang tăng mạnh khiến buồn tiểu liên tục.", babyMilestone: "Lông tơ và chất gây trên da bắt đầu bong ra, lẫn vào nước ối và được bé nuốt vào tạo thành phân su.", momCare: "Khám thai 1 tuần/lần từ mốc này. Làm xét nghiệm liên cầu khuẩn nhóm B (GBS) để bảo vệ bé khi sinh thường." },
          37: { title: "Thai nhi chính thức 'Đủ tháng'", sizeComparison: "Bằng một quả mít vừa", weight: "~ 2.85 kg", length: "~ 48.6 cm", fruitIcon: "🍈", fruitName: "Quả mít vừa", description: "Chúc mừng mẹ! Từ tuần này, em bé được coi là đã phát triển đủ tháng (Early Term). Bé đã hoàn toàn sẵn sàng cho cuộc sống bên ngoài tử cung.", babyMilestone: "Hệ thống phổi đã tự sản xuất hoàn toàn đủ chất diện hoạt để tự thở không khí ngoài trời.", momCare: "Theo dõi sát sao các dấu hiệu chuyển dạ thực sự: rỉ ối, vỡ ối, ra dịch hồng âm đạo hoặc gò tử cung đau đều đặn." },
          38: { title: "Tiêu thụ chất béo", sizeComparison: "Bằng một quả mít lớn", weight: "~ 3.1 kg", length: "~ 49.8 cm", fruitIcon: "🍈", fruitName: "Quả mít lớn", description: "Các lớp mỡ tiếp tục được tích lũy để giúp bé duy trì thân nhiệt. Vòng đầu của bé hiện tại có kích thước gần tương đương với vòng bụng.", babyMilestone: "Phản xạ cầm nắm của bé cực kỳ mạnh mẽ, hai tay đã có thể nắm chặt.", momCare: "Chuẩn bị sẵn sàng tinh thần, kiểm tra lại giấy tờ tùy thân, bảo hiểm và số điện thoại của bác sĩ/bệnh viện." },
          39: { title: "Sẵn sàng chào đời", sizeComparison: "Bằng một quả dưa hấu khổng lồ", weight: "~ 3.3 kg", length: "~ 50.7 cm", fruitIcon: "🍉", fruitName: "Dưa hấu khổng lồ", description: "Bé cưng đã tích lũy đủ cân nặng tiêu chuẩn (3.0 - 3.4 kg). Mọi cơ quan nội tạng đã ở trạng thái tối ưu nhất chờ ngày chào đời.", babyMilestone: "Lớp da bên ngoài liên tục được tái tạo tế bào mới khỏe mạnh.", momCare: "Mẹ có thể đi bộ nhẹ nhàng quanh nhà để giúp cổ tử cung mở thuận lợi hơn." },
          40: { title: "Ngày dự sinh hạnh phúc", sizeComparison: "Kích thước hoàn hảo của em bé sơ sinh", weight: "3.2 - 3.5 kg", length: "50 - 52 cm", fruitIcon: "👶", fruitName: "Em bé sơ sinh hoàn chỉnh", description: "Mốc 40 tuần thai kỳ viên mãn. Bé yêu sẽ sớm cất tiếng khóc chào đời để ôm lấy mẹ. Hãy tự hào vì mẹ đã hoàn thành xuất sắc hành trình 280 ngày kỳ diệu!", babyMilestone: "Bé cưng thức tỉnh, hệ tuần hoàn tự đóng các ống tim thai cũ để chuyển sang nhịp thở phổi hoàn chỉnh ngay khi chào đời.", momCare: "Hãy thả lỏng tinh thần, hít thở đều đặn theo hướng dẫn của hộ sinh và bác sĩ. Mẹ sắp được gặp thiên thần nhỏ rồi!" }
        };

        function App() {
          const [activeTab, setActiveTab] = useState("development"); // "development", "nutrition", "husband"
          
          // Unified Global Week State
          const [selectedWeek, setSelectedWeek] = useState(20);

          // Tab 2: Trimester State derived dynamically
          const selectedTrimester = useMemo(() => {
            if (selectedWeek <= 13) return 1;
            if (selectedWeek <= 27) return 2;
            return 3;
          }, [selectedWeek]);

          const [selectedDay, setSelectedDay] = useState("Thứ 2");
          const [swappedMeals, setSwappedMeals] = useState({});

          // Weight Tracker Inputs - Cho phép số thập phân
          const [height, setHeight] = useState("158.0"); // cm
          const [weight, setWeight] = useState("57.0"); // kg (pre-pregnancy)
          const [currentWeight, setCurrentWeight] = useState("57.0"); // kg
          
          const [trackerCalculated, setTrackerCalculated] = useState(false);
          const [calcResult, setCalcResult] = useState(null);

          useEffect(() => {
            setTrackerCalculated(false); 
            setCalcResult(null);
          }, [selectedWeek]);

          const triConfig = TRIDATA[selectedTrimester];

          const getMealKey = (tri, day, index) => `${tri}-${day}-${index}`;

          const toggleMealSwap = (index) => {
            const key = getMealKey(selectedTrimester, selectedDay, index);
            setSwappedMeals(prev => ({
              ...prev,
              [key]: !prev[key]
            }));
          };

          // Hàm hỗ trợ nhập liệu số thập phân linh hoạt
          const handleDecimalInput = (setter) => (e) => {
              let val = e.target.value.replace(/[^0-9.,]/g, '').replace(',', '.');
              // Chỉ giữ lại 1 dấu chấm thập phân duy nhất
              const parts = val.split('.');
              if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
              setter(val);
          };

          // BMI & Healthy Weight Gain Range calculation
          const handleCalculateWeight = (e) => {
            e.preventDefault();
            
            // Parse String States to Floats safely
            const numHeight = parseFloat(height) || 0;
            const numWeight = parseFloat(weight) || 0;
            const numCurrentWeight = parseFloat(currentWeight) || 0;

            if (numHeight === 0 || numWeight === 0) return;

            const heightInMeters = numHeight / 100;
            const bmi = numWeight / (heightInMeters * heightInMeters);
            
            let category = "";
            let recommendedTotalMin = 0;
            let recommendedTotalMax = 0;
            let ratePerWeekAfterT1 = 0; 

            if (bmi < 18.5) {
              category = "Thiếu cân (Underweight)";
              recommendedTotalMin = 12.5;
              recommendedTotalMax = 18.0;
              ratePerWeekAfterT1 = 0.51; 
            } else if (bmi >= 18.5 && bmi < 24.9) {
              category = "Cân nặng bình thường (Normal)";
              recommendedTotalMin = 11.5;
              recommendedTotalMax = 16.0;
              ratePerWeekAfterT1 = 0.42;
            } else if (bmi >= 25.0 && bmi < 29.9) {
              category = "Thừa cân (Overweight)";
              recommendedTotalMin = 7.0;
              recommendedTotalMax = 11.5;
              ratePerWeekAfterT1 = 0.28;
            } else {
              category = "Béo phì (Obese)";
              recommendedTotalMin = 5.0;
              recommendedTotalMax = 9.0;
              ratePerWeekAfterT1 = 0.22;
            }

            let expectedMin = numWeight;
            let expectedMax = numWeight;

            if (selectedWeek <= 13) {
              const progressRatio = selectedWeek / 13;
              expectedMin = numWeight + (0.5 * progressRatio);
              expectedMax = numWeight + (2.0 * progressRatio);
            } else {
              const weeksPostT1 = selectedWeek - 13;
              expectedMin = numWeight + 0.5 + (ratePerWeekAfterT1 * weeksPostT1 * 0.85);
              expectedMax = numWeight + 2.0 + (ratePerWeekAfterT1 * weeksPostT1 * 1.15); 
            }

            const currentGain = numCurrentWeight - numWeight;
            let statusText = "";
            let statusColor = "";

            if (numCurrentWeight < expectedMin) {
              statusText = "Tăng cân chậm hơn khuyến nghị. Mẹ hãy tham khảo ý kiến bác sĩ và bổ sung thêm chất dinh dưỡng.";
              statusColor = "text-amber-600 bg-amber-50 border-amber-200";
            } else if (numCurrentWeight > expectedMax) {
              statusText = "Tăng cân nhanh hơn khuyến nghị. Mẹ nên kiểm soát lượng tinh bột đường tinh chế và hỏi ý kiến bác sĩ để tầm soát tiểu đường thai kỳ.";
              statusColor = "text-red-600 bg-red-50 border-red-200";
            } else {
              statusText = "Tăng cân hoàn hảo! Mẹ hãy tiếp tục duy trì chế độ ăn uống và tập luyện nhẹ nhàng hiện tại nhé.";
              statusColor = "text-emerald-600 bg-emerald-50 border-emerald-200";
            }

            setCalcResult({
              bmi: bmi.toFixed(1),
              category,
              recommendedTotal: `${recommendedTotalMin} - ${recommendedTotalMax} kg`,
              expectedRange: `${expectedMin.toFixed(1)} - ${expectedMax.toFixed(1)} kg`,
              currentGain: currentGain.toFixed(1),
              statusText,
              statusColor
            });
            setTrackerCalculated(true);
          };

          const handleResetWeight = () => {
            setHeight("160.0");
            setWeight("55.0");
            setSelectedWeek(20);
            setCurrentWeight("60.0");
            setTrackerCalculated(false);
            setCalcResult(null);

          // Generate dynamic grocery list
          const currentDayMeals = triConfig.days[selectedDay] || [];

              if (textToParse.toLowerCase().includes("măng tây")) list.push("Măng tây non sạch nhiều folate");

              if (textToParse.toLowerCase().includes("bí đỏ")) list.push("Bí đỏ hữu cơ");
              if (textToParse.toLowerCase().includes("cá hồi")) list.push("Filet cá hồi tươi dồi dào DHA");
              if (textToParse.toLowerCase().includes("quả bơ") || textToParse.toLowerCase().includes("bơ dầm")) list.push("Quả bơ chín tự nhiên");

            });
            return [...new Set(list)];
          }, [selectedTrimester, selectedDay, swappedMeals]);

          const weekData = WEEKS_DEVELOPMENT[selectedWeek] || WEEKS_DEVELOPMENT[1];

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased pb-12">
              
              <header className="bg-gradient-to-r from-teal-700 via-emerald-700 to-emerald-800 text-white shadow-md relative overflow-hidden">
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_30%_20%,rgba(255,255,255,0.1),transparent)] pointer-events-none"></div>
                <div className="max-w-6xl mx-auto px-4 py-8 relative z-10">
                  <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                    <div className="text-center md:text-left">
                      <span className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-emerald-600/50 text-emerald-100 text-xs font-semibold mb-3 border border-emerald-500/30">
                        <IconSparkles />
                        Chuẩn Y Khoa Quốc Gia & WHO
                      </span>
                      <h1 className="text-3xl md:text-4xl font-extrabold tracking-tight">
                        Cẩm Nang & Thực Đơn Dinh Dưỡng Thai Kỳ
                      </h1>
                      <p className="mt-2 text-teal-100 max-w-2xl text-sm md:text-base leading-relaxed">
                        Ứng dụng đồng hành khoa học giúp mẹ bầu theo dõi sự phát triển chi tiết từng tuần của thai nhi, tính toán chỉ số sức khỏe, và lên thực đơn dinh dưỡng chuẩn y khoa.
                      </p>
                    </div>
                    
                    <div className="flex items-center gap-3 bg-white/10 backdrop-blur-md px-5 py-4 rounded-xl border border-white/20 self-center md:self-auto">
                      <IconHeart className="text-pink-400 animate-bounce" />
                      <div>
                        <div className="text-xs text-teal-200 font-medium">Đồng bộ tuần thai</div>
